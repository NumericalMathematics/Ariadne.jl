name: Downgrade

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  Ariadne:
    name: Downgrade Ariadne - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v3

      - uses: julia-actions/julia-downgrade-compat@v2
        with:
          skip: LinearAlgebra,SparseArrays,Test,Statistics
          projects: ., test
          mode: forcedeps

      - name: Run tests
        working-directory: test
        run: |
          julia --project=. --color=yes -e '
            import Pkg
            Pkg.develop(Pkg.PackageSpec(path=".."))
            Pkg.instantiate()
            Pkg.status(; mode = Pkg.PKGMODE_MANIFEST)
            include("runtests.jl")
          '

  Theseus:
    name: Downgrade Theseus - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v3

      - uses: julia-actions/julia-downgrade-compat@v2
        with:
          skip: LinearAlgebra,SparseArrays,Test,Statistics
          projects: libs/Theseus, libs/Theseus/test
          mode: forcedeps

      - name: Run tests
        working-directory: libs/Theseus/test
        run: |
          julia --project=. --color=yes -e '
            import Pkg
            Pkg.develop(Pkg.PackageSpec(path=".."))
            Pkg.develop(Pkg.PackageSpec(path="../../.."))
            Pkg.status(; mode = Pkg.PKGMODE_MANIFEST)
            Pkg.instantiate()
            include("runtests.jl")
          '
