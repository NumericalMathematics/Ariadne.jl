name: Downgrade
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  Ariadne:
    name: Downgrade Ariadne - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-downgrade-compat@v2
        with:
          skip: LinearAlgebra,SparseArrays,Test,Statistics,Krylov,Enzyme
          projects: ., test
          mode: forcedeps
      - name: Run tests
        run: |
          julia --project=test --color=yes -e '
            import Pkg; Pkg.instantiate()
            include("test/runtests.jl")
          '

  Theseus:
    name: Downgrade Theseus - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-downgrade-compat@v2
        with:
          skip: LinearAlgebra,SparseArrays,Test,Statistics,Krylov
          projects: libs/Theseus, libs/Theseus/test
          mode: forcedeps
      - name: Run tests
        run: |
          julia --project=libs/Theseus/test --color=yes -e '
            import Pkg
            Pkg.develop(Pkg.PackageSpec(path="."))
            Pkg.develop(Pkg.PackageSpec(path="libs/Theseus"))
            Pkg.instantiate()
            include("libs/Theseus/test/runtests.jl")
          '
